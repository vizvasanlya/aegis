name: Aegis Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6am UTC
  workflow_dispatch:
    inputs:
      scan_mode:
        description: 'Scan mode'
        required: false
        default: 'quick'
        type: choice
        options:
          - quick
          - standard
          - deep
      target:
        description: 'Specific target URL (optional, defaults to repo)'

env:
  AEGIS_IMAGE: ghcr.io/vizvasanlya/aegis-sandbox:latest

jobs:
  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # For SARIF upload
      pull-requests: write     # For PR comments

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Aegis Security Scan
        uses: docker://ghcr.io/vizvasanlya/aegis-sandbox:latest
        with:
          entrypoint: aegis
          args: >
            -n
            --target ${{ github.workspace }}
            --scan-mode ${{ github.event.inputs.scan_mode || 'quick' }}
            --instruction "Focus on OWASP Top 10, secrets, and dependency vulnerabilities. Output SARIF format."

      - name: Generate SARIF Report
        if: always()
        run: |
          # Convert Aegis findings to SARIF format
          if [ -d "aegis_runs" ]; then
            LATEST_RUN=$(ls -td aegis_runs/*/ | head -1)
            if [ -f "${LATEST_RUN}/vulnerabilities.json" ]; then
              python3 -c "
          import json, sys
          from datetime import datetime

          with open('${LATEST_RUN}/vulnerabilities.json') as f:
              vulns = json.load(f)

          sarif = {
              '\$schema': 'https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json',
              'version': '2.1.0',
              'runs': [{
                  'tool': {
                      'driver': {
                          'name': 'Aegis',
                          'version': '1.0.0',
                          'informationUri': 'https://github.com/vizvasanlya/aegis',
                          'rules': []
                      }
                  },
                  'results': []
              }]
          }

          for i, v in enumerate(vulns):
              rule_id = v.get('cwe', f'VULN-{i}')
              sarif['runs'][0]['tool']['driver']['rules'].append({
                  'id': rule_id,
                  'name': v.get('title', 'Unknown'),
                  'shortDescription': {'text': v.get('title', '')},
                  'fullDescription': {'text': v.get('description', '')},
                  'helpUri': f'https://cwe.mitre.org/data/definitions/{v.get(\"cwe_id\", 0)}.html',
                  'properties': {'tags': ['security', v.get('severity', 'unknown')]}
              })

              sarif['runs'][0]['results'].append({
                  'ruleId': rule_id,
                  'message': {'text': v.get('description', '')},
                  'locations': [{
                      'physicalLocation': {
                          'artifactLocation': {'uri': v.get('endpoint', 'unknown')},
                          'region': {'startLine': 1}
                      }
                  }],
                  'level': 'error' if v.get('severity') in ('critical', 'high') else 'warning',
                  'properties': {'cvss': v.get('cvss', 0)}
              })

          with open('sarif-results.sarif', 'w') as f:
              json.dump(sarif, f, indent=2)

          print(f'Generated SARIF with {len(vulns)} findings')
          "
            fi
          fi

      - name: Upload SARIF to GitHub Security
        if: always() && hashFiles('sarif-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: sarif-results.sarif
          category: aegis-scan

      - name: Comment on PR with findings
        if: always() && github.event_name == 'pull_request'
        run: |
          if [ -d "aegis_runs" ]; then
            LATEST_RUN=$(ls -td aegis_runs/*/ | head -1)
            if [ -f "${LATEST_RUN}/vulnerabilities.json" ]; then
              python3 -c "
          import json

          with open('${LATEST_RUN}/vulnerabilities.json') as f:
              vulns = json.load(f)

          if not vulns:
              exit(0)

          severity_counts = {}
          for v in vulns:
              sev = v.get('severity', 'unknown')
              severity_counts[sev] = severity_counts.get(sev, 0) + 1

          lines = ['## Aegis Security Scan Results\n']
          lines.append(f'**{len(vulns)} vulnerabilities found**\n')
          lines.append('| Severity | Count |')
          lines.append('|----------|-------|')
          for sev in ['critical', 'high', 'medium', 'low']:
              if sev in severity_counts:
                  emoji = {'critical': '🔴', 'high': '🟠', 'medium': '🟡', 'low': '🔵'}.get(sev, '⚪')
                  lines.append(f'| {emoji} {sev.title()} | {severity_counts[sev]} |')
          lines.append('')

          for v in vulns[:10]:
              sev = v.get('severity', 'unknown')
              emoji = {'critical': '🔴', 'high': '🟠', 'medium': '🟡', 'low': '🔵'}.get(sev, '⚪')
              lines.append(f'- {emoji} **{v.get(\"title\", \"Unknown\")}** — {v.get(\"description\", \"\")[:100]}')

          if len(vulns) > 10:
              lines.append(f'\n... and {len(vulns) - 10} more')

          comment = '\n'.join(lines)
          with open('pr-comment.md', 'w') as f:
              f.write(comment)
          print(f'Generated PR comment with {len(vulns)} findings')
          "
            fi
          fi

      - name: Post PR Comment
        if: always() && github.event_name == 'pull_request' && hashFiles('pr-comment.md') != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('pr-comment.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aegis-scan-results
          path: |
            aegis_runs/*/vulnerabilities.json
            aegis_runs/*/penetration_test_report.md
            sarif-results.sarif
          retention-days: 30
